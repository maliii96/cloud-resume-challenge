name: Deploy Cloud Resume

on:
  push:
    branches: [main]

jobs:
  test-lambda:
    name: Test Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3 pytest

      - name: Run tests
        run: cd lambda && python -m pytest test_lambda.py -v

  deploy-frontend:
    name: Deploy Frontend to S3
    needs: test-lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync frontend to S3
        run: |
          aws s3 cp index.html s3://maliksresume.click/index.html
          aws s3 cp style.css s3://maliksresume.click/style.css
          aws s3 cp script.js s3://maliksresume.click/script.js

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E12ZHY1ZZFSUNU \
            --paths "/*"

  deploy-lambda:
    name: Deploy Lambda
    needs: test-lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Package Lambda
        run: cd lambda && zip function.zip lambda_function.py

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name cloud-resume-visitor-counter \
            --zip-file fileb://lambda/function.zip
